<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر Forever الفاخر - 42 منتج</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
            padding: 30px 0;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .header p {
            font-size: 1.1em;
            color: #bbb;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255,215,0,0.3);
        }
        
        .product-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            font-weight: bold;
            color: #1a1a2e;
        }
        
        .product-info {
            padding: 15px;
        }
        
        .product-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        
        .product-price {
            font-size: 1.3em;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .product-buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .btn-add {
            background: #ffd700;
            color: #1a1a2e;
        }
        
        .btn-add:hover {
            background: #ffed4e;
        }
        
        .btn-info {
            background: #0066cc;
            color: white;
        }
        
        .btn-info:hover {
            background: #0052a3;
        }
        
        .cart-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .cart-section h2 {
            color: #1a1a2e;
            margin-bottom: 15px;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .cart-total {
            font-size: 1.3em;
            font-weight: bold;
            color: #ffd700;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #ffd700;
        }
        
        .whatsapp-btn {
            background: #25d366;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: 0.3s;
        }
        
        .whatsapp-btn:hover {
            background: #1fa952;
        }
        
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ متجر Forever الفاخر ✨</h1>
            <p>42 منتج متميز للعناية والجمال</p>
        </div>
        
        <div class="products-grid" id="productsGrid"></div>
        
        <div class="cart-section">
            <h2>🛒 سلة التسوق</h2>
            <div id="cartItems"></div>
            <div class="cart-total">
                الإجمالي: <span id="cartTotal">0</span> ريس
            </div>
            <button class="whatsapp-btn" onclick="sendToWhatsApp()">
                📱 إرسال الطلب عبر WhatsApp
            </button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: 'حبوب اللقاح الملكية', price: 180, emoji: '🐝' },
            { id: 2, name: 'محجون الأسنان', price: 60, emoji: '😁' },
            { id: 3, name: 'كريم الوجه الذهبي', price: 150, emoji: '✨' },
            { id: 4, name: 'سيروم العناية', price: 120, emoji: '💧' },
            { id: 5, name: 'ماسك الوجه الطبيعي', price: 90, emoji: '🧴' },
            { id: 6, name: 'زيت الشعر المغذي', price: 110, emoji: '🧴' },
            { id: 7, name: 'غسول الوجه اللطيف', price: 75, emoji: '🧼' },
            { id: 8, name: 'كريم اليدين المرطب', price: 65, emoji: '🤲' },
            { id: 9, name: 'بخاخ العطر الفاخر', price: 200, emoji: '💐' },
            { id: 10, name: 'شامبو الشعر الطبيعي', price: 85, emoji: '🧴' },
            { id: 11, name: 'بلسم الشعر المرطب', price: 80, emoji: '🧴' },
            { id: 12, name: 'ماسك الشعر العميق', price: 95, emoji: '💆' },
            { id: 13, name: 'كريم العينين المتقدم', price: 140, emoji: '👁️' },
            { id: 14, name: 'مقشر الوجه الناعم', price: 70, emoji: '✨' },
            { id: 15, name: 'تونر الوجه المتوازن', price: 85, emoji: '💧' },
            { id: 16, name: 'كريم الليل المغذي', price: 130, emoji: '🌙' },
            { id: 17, name: 'واقي الشمس الفاخر', price: 100, emoji: '☀️' },
            { id: 18, name: 'حمام زيت الشعر', price: 105, emoji: '🧴' },
            { id: 19, name: 'كريم تفتيح البشرة', price: 160, emoji: '✨' },
            { id: 20, name: 'سيروم فيتامين سي', price: 135, emoji: '🍊' },
            { id: 21, name: 'جل الصبار المهدئ', price: 60, emoji: '🌿' },
            { id: 22, name: 'كريم الرقبة المشدد', price: 125, emoji: '💪' },
            { id: 23, name: 'بخاخ تثبيت المكياج', price: 55, emoji: '💄' },
            { id: 24, name: 'أساس الماكياج السائل', price: 95, emoji: '💄' },
            { id: 25, name: 'كحل العيون الفاخر', price: 50, emoji: '👁️' },
            { id: 26, name: 'أحمر الشفاه الحريري', price: 65, emoji: '💋' },
            { id: 27, name: 'ظلال العيون المتدرجة', price: 75, emoji: '👁️' },
            { id: 28, name: 'ماسكارا الرموش الكثيفة', price: 70, emoji: '👁️' },
            { id: 29, name: 'بودرة الوجه الناعمة', price: 60, emoji: '✨' },
            { id: 30, name: 'بلاشر الخدود الوردي', price: 55, emoji: '😊' },
            { id: 31, name: 'هايلايتر الوجه المتألق', price: 65, emoji: '✨' },
            { id: 32, name: 'برايمر الوجه الناعم', price: 80, emoji: '✨' },
            { id: 33, name: 'زيت الجسم المعطر', price: 90, emoji: '🧴' },
            { id: 34, name: 'لوشن الجسم المرطب', price: 75, emoji: '🧴' },
            { id: 35, name: 'مقشر الجسم الناعم', price: 70, emoji: '✨' },
            { id: 36, name: 'صابون الاستحمام الطبيعي', price: 50, emoji: '🧼' },
            { id: 37, name: 'كريم الأقدام المرطب', price: 65, emoji: '🦶' },
            { id: 38, name: 'مزيل الروائح الطبيعي', price: 55, emoji: '🌿' },
            { id: 39, name: 'حمام الفقاعات الفاخر', price: 85, emoji: '🛁' },
            { id: 40, name: 'ملح الاستحمام المعطر', price: 60, emoji: '🧂' },
            { id: 41, name: 'شموع الاستحمام العطرية', price: 75, emoji: '🕯️' },
            { id: 42, name: 'مجموعة العناية الفاخرة', price: 250, emoji: '🎁' }
        ];
        
        let cart = [];
        
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">${product.emoji}</div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price} ريس</div>
                        <div class="product-buttons">
                            <button class="btn btn-add" onclick="addToCart(${product.id})">أضف</button>
                            <button class="btn btn-info" onclick="showInfo(${product.id})">معلومات</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCart();
        }
        
        function updateCart() {
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p style="color: #999; text-align: center;">السلة فارغة</p>';
                cartTotal.textContent = '0';
                return;
            }
            
            let total = 0;
            cartItems.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div class="cart-item">
                        <span>${item.name} × ${item.quantity}</span>
                        <span>${item.price * item.quantity} ريس</span>
                        <button class="btn" style="width: 60px; background: #ff6b6b; color: white;" onclick="removeFromCart(${item.id})">حذف</button>
                    </div>
                `;
            }).join('');
            
            cartTotal.textContent = total;
        }
        
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }
        
        function sendToWhatsApp() {
            if (cart.length === 0) {
                alert('السلة فارغة! أضف منتجات أولاً');
                return;
            }
            
            let message = 'مرحباً، أود طلب المنتجات التالية من متجر Forever:\n\n';
            let total = 0;
            
            cart.forEach(item => {
                message += `• ${item.name} × ${item.quantity} = ${item.price * item.quantity} ريس\n`;
                total += item.price * item.quantity;
            });
            
            message += `\nالإجمالي: ${total} ريس`;
            
            const whatsappNumber = '966501234567';
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/${whatsappNumber}?text=${encodedMessage}`);
        }
        
        function showInfo(productId) {
            const product = products.find(p => p.id === productId);
            alert(`${product.name}\n\nالسعر: ${product.price} ريس\n\nمنتج من Forever للعناية والجمال`);
        }
        
        renderProducts();
    </script>
</body>
</html>
