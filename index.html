<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر Forever</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #2c3e50, #34495e); color: #f39c12; padding: 20px; text-align: center; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .nav { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .nav button { padding: 10px 20px; background: #f39c12; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .nav button:hover { background: #e67e22; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card-img { width: 100%; height: 150px; background: #ecf0f1; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .card-body { padding: 15px; }
        .card-title { font-weight: bold; color: #2c3e50; margin-bottom: 8px; }
        .card-price { color: #f39c12; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-info { background: #3498db; color: white; }
        .btn-add { background: #f39c12; color: white; }
        .btn:hover { opacity: 0.9; }
        .section { display: none; }
        .section.active { display: block; }
        .cart-item { background: white; padding: 15px; margin: 10px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; }
        .total { font-size: 20px; font-weight: bold; color: #f39c12; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌟 متجر Forever الفاخر 🌟</h1>
        <p>أفضل منتجات العناية والصحة</p>
    </div>

    <div class="nav">
        <button onclick="showSection('products')">المتجر</button>
        <button onclick="showSection('cart')">السلة (0)</button>
        <button onclick="showSection('contact')">تواصل معنا</button>
    </div>

    <div class="container">
        <div id="products" class="section active">
            <div class="grid" id="productsGrid"></div>
        </div>

        <div id="cart" class="section">
            <h2>سلة التسوق</h2>
            <div id="cartItems"></div>
            <div class="total">الإجمالي: <span id="total">0</span> ر.س</div>
            <form id="checkoutForm" style="display:none;">
                <div class="form-group">
                    <label>الاسم</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>الهاتف</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label>WhatsApp</label>
                    <input type="tel" id="whatsapp" required>
                </div>
                <div class="form-group">
                    <label>العنوان</label>
                    <input type="text" id="address" required>
                </div>
                <button type="button" onclick="checkout()" class="btn btn-add" style="width:100%; padding:12px;">إتمام الشراء</button>
            </form>
            <div id="emptyMsg" style="text-align:center; padding:40px;">السلة فارغة</div>
        </div>

        <div id="contact" class="section">
            <h2>تواصل معنا</h2>
            <p>البريد: info@forever.com</p>
            <p>الهاتف: +966 50 000 0000</p>
            <p>Telegram: @f_health_sa</p>
        </div>
    </div>

    <script>
        const products = [
            {id: 1, name: "جل الصبار", price: 120, emoji: "🌿"},
            {id: 2, name: "مرطب الشفاه", price: 45, emoji: "💄"},
            {id: 3, name: "حبوب اللقاح", price: 180, emoji: "🐝"},
            {id: 4, name: "معجون الأسنان", price: 60, emoji: "😁"},
            {id: 5, name: "غذاء ملكات النحل", price: 200, emoji: "👑"},
            {id: 6, name: "رذاذ الصبار", price: 85, emoji: "💨"},
            {id: 7, name: "كريم البروبوليس", price: 150, emoji: "🧴"},
            {id: 8, name: "هلام الصبار", price: 95, emoji: "🌱"},
            {id: 9, name: "لوشن الترطيب", price: 110, emoji: "🧴"},
            {id: 10, name: "لوشن التدفئة", price: 130, emoji: "🔥"},
            {id: 11, name: "الثوم والزعتر", price: 140, emoji: "🧄"},
            {id: 12, name: "مزيل العرق", price: 50, emoji: "🚫"},
            {id: 13, name: "عامل R3", price: 160, emoji: "💊"},
            {id: 14, name: "جارسينيا بلس", price: 175, emoji: "⚖️"},
            {id: 15, name: "عامل ألفا إي", price: 155, emoji: "💪"},
            {id: 16, name: "معزز المناعة", price: 190, emoji: "🛡️"},
            {id: 17, name: "منشط الصبار", price: 100, emoji: "⚡"},
            {id: 18, name: "البحر المتجمد", price: 165, emoji: "🌊"},
            {id: 19, name: "بروبوليس النحل", price: 185, emoji: "🍯"},
            {id: 20, name: "الكالسيوم", price: 145, emoji: "🦴"},
            {id: 21, name: "كلين 9", price: 250, emoji: "🧹"},
            {id: 22, name: "إشنسيا", price: 135, emoji: "🌸"},
            {id: 23, name: "حقل الخضار", price: 170, emoji: "🥬"},
            {id: 24, name: "فوريفر فيت", price: 180, emoji: "🏃"},
            {id: 25, name: "الجنسنج", price: 155, emoji: "🌿"},
            {id: 26, name: "جلوكوسامين", price: 165, emoji: "🦵"},
            {id: 27, name: "لوشن التدفئة بلس", price: 140, emoji: "🔥"},
            {id: 28, name: "الحديد", price: 125, emoji: "⚙️"},
            {id: 29, name: "حركة المفاصل", price: 175, emoji: "🧘"},
            {id: 30, name: "لايسيوم بلس", price: 160, emoji: "👁️"},
            {id: 31, name: "ماكا متعددة", price: 180, emoji: "💥"},
            {id: 32, name: "صبار غذائي", price: 130, emoji: "🍃"},
            {id: 33, name: "قوة بوميستين", price: 185, emoji: "❤️"},
            {id: 34, name: "شيك سليك", price: 195, emoji: "🥤"},
            {id: 35, name: "قناع سونيا", price: 120, emoji: "😷"},
            {id: 36, name: "مرطب سونيا", price: 140, emoji: "🧴"},
            {id: 37, name: "سيرم سونيا", price: 150, emoji: "💧"},
            {id: 38, name: "تونر سونيا", price: 100, emoji: "🌊"},
            {id: 39, name: "واقي الشمس", price: 95, emoji: "☀️"},
            {id: 40, name: "فايتال 5", price: 170, emoji: "🎯"},
            {id: 41, name: "عشبة القمح", price: 155, emoji: "🌾"},
            {id: 42, name: "حزمة النساء", price: 220, emoji: "👩"}
        ];

        let cart = [];

        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-img">${p.emoji}</div>
                        <div class="card-body">
                            <div class="card-title">${p.name}</div>
                            <div class="card-price">${p.price} ر.س</div>
                            <div class="btn-group">
                                <button class="btn btn-info" onclick="alert('${p.name}\\nالسعر: ${p.price} ر.س')">معلومات</button>
                                <button class="btn btn-add" onclick="addCart(${p.id}, '${p.name}', ${p.price})">أضف</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function addCart(id, name, price) {
            cart.push({id, name, price});
            updateCart();
            alert('تم إضافة ' + name + ' للسلة');
        }

        function updateCart() {
            const cartDiv = document.getElementById('cartItems');
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('total').textContent = total;
            document.querySelector('.nav button:nth-child(2)').textContent = 'السلة (' + cart.length + ')';

            if (cart.length === 0) {
                cartDiv.innerHTML = '';
                document.getElementById('emptyMsg').style.display = 'block';
                document.getElementById('checkoutForm').style.display = 'none';
            } else {
                document.getElementById('emptyMsg').style.display = 'none';
                document.getElementById('checkoutForm').style.display = 'block';
                cartDiv.innerHTML = cart.map((item, idx) => `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <span>${item.price} ر.س</span>
                        <button class="btn btn-info" onclick="removeCart(${idx})" style="width:60px;">حذف</button>
                    </div>
                `).join('');
            }
        }

        function removeCart(idx) {
            cart.splice(idx, 1);
            updateCart();
        }

        function checkout() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const address = document.getElementById('address').value;

            if (!name || !phone || !whatsapp || !address) {
                alert('يرجى ملء جميع الحقول');
                return;
            }

            let msg = 'طلب شراء من متجر Forever\n\n';
            msg += 'الاسم: ' + name + '\n';
            msg += 'الهاتف: ' + phone + '\n';
            msg += 'العنوان: ' + address + '\n\n';
            msg += 'المنتجات:\n';
            let total = 0;
            cart.forEach(item => {
                msg += '- ' + item.name + ': ' + item.price + ' ر.س\n';
                total += item.price;
            });
            msg += '\nالإجمالي: ' + total + ' ر.س';

            const url = 'https://wa.me/966' + whatsapp.replace(/^0/, '') + '?text=' + encodeURIComponent(msg);
            window.open(url);
            cart = [];
            updateCart();
            alert('تم إرسال الطلب!');
        }

        function showSection(name) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(name).classList.add('active');
        }

        displayProducts();
        updateCart();
    </script>
</body>
</html>
